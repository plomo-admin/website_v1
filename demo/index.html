<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plomo.ai — Demo</title>
    <meta
      name="description"
      content="Try Plomo — the AI-driven platform for sell-side M&A. Request a free tour over a call."
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Overpass:wght@300;400;500;600;700&display=swap");

      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Overpass", "SF Pro Text", system-ui, -apple-system, sans-serif;
        font-weight: 300;
        letter-spacing: -0.04em;
        color: #000000;
        background: #eeeeee;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 100vh;
      }

      .left {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 48px;
        background: #eeeeee;
      }

      .left-inner {
        max-width: 360px;
        text-align: center;
      }

      .left h1 {
        font-size: clamp(24px, 3vw, 32px);
        font-weight: 400;
        line-height: 1.35;
        margin: 0 0 24px;
        color: #000000;
      }

      .left p {
        font-size: 16px;
        line-height: 1.6;
        color: #333333;
        margin: 0 0 28px;
      }

      .left a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 16px 24px;
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.3);
        background: #e5e5e5;
        color: #000000;
        font-size: 14px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        text-decoration: none;
        transition: background 0.2s ease, border-color 0.2s ease;
      }

      .left a:hover {
        background: rgba(0, 0, 0, 0.08);
        border-color: rgba(0, 0, 0, 0.45);
      }

      .right {
        min-height: 100vh;
        background: #ffffff;
      }

      .right iframe {
        width: 100%;
        height: 100%;
        min-height: 100vh;
        border: none;
        display: block;
      }

      .back {
        position: absolute;
        top: 24px;
        left: 24px;
        font-size: 14px;
        color: #333333;
        text-decoration: none;
        transition: color 0.2s ease;
      }

      .back:hover {
        color: #000000;
      }

      .left {
        position: relative;
      }

      @media (max-width: 768px) {
        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
        }

        .left {
          padding: 32px 24px;
          min-height: auto;
        }

        .right {
          min-height: 60vh;
        }

        .right iframe {
          min-height: 60vh;
        }
      }
    </style>
  </head>
  <body>
    <a class="back" href="../index_v1.html">← Back</a>
    <div class="layout">
      <div class="left">
        <div class="left-inner">
          <h1>No demo account yet?</h1>
          <p>Ask for a free tour over a call. We&apos;ll walk you through the platform and answer your questions.</p>
          <a href="https://calendar.app.google/nQuCn2gUEdkcHPYM9" target="_blank" rel="noopener">Request a free tour</a>
        </div>
      </div>
      <div class="right">
        <iframe
          src="https://app.plomo.ai"
          title="Plomo app"
        ></iframe>
      </div>
    </div>
  </body>
</html>
